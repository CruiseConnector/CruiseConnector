<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VuckoClaw Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #1C1F26;
            color: #E4E6EB;
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #252830;
            border-right: 1px solid #3A3F4B;
            display: flex;
            flex-direction: column;
            padding: 24px 0;
        }

        .logo {
            padding: 0 24px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #3A3F4B;
            margin-bottom: 24px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #FF4444, #CC0000);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #E4E6EB;
        }

        .nav-menu {
            flex: 1;
            padding: 0 16px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            margin-bottom: 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: #9CA3AF;
            font-size: 15px;
            font-weight: 500;
        }

        .nav-item:hover {
            background: #2E333D;
            color: #E4E6EB;
        }

        .nav-item.active {
            background: rgba(255, 68, 68, 0.15);
            color: #FF4444;
        }

        .nav-icon {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #E4E6EB;
            margin-bottom: 8px;
        }

        .header p {
            color: #9CA3AF;
            font-size: 16px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #252830;
            border: 1px solid #3A3F4B;
            border-radius: 16px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .stat-label {
            font-size: 14px;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 42px;
            font-weight: 700;
            color: #E4E6EB;
        }

        .stat-card.active .stat-value {
            color: #FF4444;
        }

        .stat-card.completed .stat-value {
            color: #22C55E;
        }

        /* Quick Actions */
        .quick-actions {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #FF4444;
            color: white;
        }

        .btn-primary:hover {
            background: #CC0000;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #2E333D;
            color: #E4E6EB;
            border: 1px solid #3A3F4B;
        }

        .btn-secondary:hover {
            background: #3A3F4B;
        }

        /* Section Title */
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #E4E6EB;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span {
            color: #FF4444;
        }

        /* Task Board */
        .task-board {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .task-board.active {
            display: grid;
        }

        .task-column {
            background: #252830;
            border: 1px solid #3A3F4B;
            border-radius: 16px;
            padding: 20px;
            min-height: 500px;
        }

        .column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #3A3F4B;
        }

        .column-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .column-title.backlog { color: #9CA3AF; }
        .column-title.progress { color: #FF4444; }
        .column-title.completed { color: #22C55E; }

        .task-count {
            background: #1C1F26;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            color: #9CA3AF;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-card {
            background: #1C1F26;
            border: 1px solid #3A3F4B;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .task-card:hover {
            border-color: #FF4444;
            box-shadow: 0 4px 12px rgba(255, 68, 68, 0.15);
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            color: #E4E6EB;
            margin-bottom: 8px;
        }

        .task-desc {
            font-size: 13px;
            color: #9CA3AF;
            line-height: 1.5;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .task-card:hover .task-actions {
            opacity: 1;
        }

        .task-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: none;
            background: #2E333D;
            color: #9CA3AF;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .task-btn:hover {
            background: #FF4444;
            color: white;
        }

        .task-btn.delete:hover {
            background: #DC2626;
        }

        /* Context Section */
        .context-section {
            display: none;
        }

        .context-section.active {
            display: block;
        }

        .context-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .context-card {
            background: #252830;
            border: 1px solid #3A3F4B;
            border-radius: 16px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .context-card:hover {
            border-color: #FF4444;
        }

        .context-header {
            padding: 16px 20px;
            background: #2E333D;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .context-name {
            font-size: 15px;
            font-weight: 600;
            color: #E4E6EB;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .context-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .context-status.exists {
            background: #22C55E;
        }

        .context-status.missing {
            background: #6B7280;
        }

        .context-body {
            padding: 16px 20px;
        }

        .context-info {
            font-size: 13px;
            color: #9CA3AF;
            margin-bottom: 12px;
        }

        .context-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #3A3F4B;
            background: transparent;
            color: #E4E6EB;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .context-btn:hover {
            background: #FF4444;
            border-color: #FF4444;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #252830;
            border: 1px solid #3A3F4B;
            border-radius: 16px;
            width: 100%;
            max-width: 500px;
            padding: 28px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: #E4E6EB;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #9CA3AF;
            margin-bottom: 8px;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            background: #1C1F26;
            border: 1px solid #3A3F4B;
            border-radius: 10px;
            color: #E4E6EB;
            font-size: 15px;
            font-family: inherit;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #FF4444;
        }

        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .dashboard-section {
            display: none;
        }

        .dashboard-section.active {
            display: block;
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            
            .sidebar {
                width: 100%;
                flex-direction: row;
                padding: 12px 16px;
                border-right: none;
                border-bottom: 1px solid #3A3F4B;
                overflow-x: auto;
            }
            
            .logo {
                padding: 0 12px 0 0;
                border-bottom: none;
                border-right: 1px solid #3A3F4B;
                margin-bottom: 0;
                margin-right: 12px;
                flex-shrink: 0;
            }
            
            .logo-icon {
                width: 32px;
                height: 32px;
                font-size: 16px;
            }
            
            .logo-text {
                font-size: 16px;
            }
            
            .nav-menu {
                display: flex;
                gap: 8px;
                padding: 0;
                flex: 1;
            }
            
            .nav-item {
                padding: 10px 14px;
                margin-bottom: 0;
                white-space: nowrap;
                font-size: 13px;
            }
            
            .nav-icon {
                width: 18px;
                height: 18px;
                font-size: 14px;
            }
            
            .main-content {
                padding: 16px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .stat-card {
                padding: 16px;
            }
            
            .stat-value {
                font-size: 32px;
            }
            
            .quick-actions {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .task-board.active {
                grid-template-columns: 1fr;
            }
            
            .task-column {
                min-height: auto;
            }
            
            .context-grid {
                grid-template-columns: 1fr;
            }
            
            .modal {
                margin: 16px;
                max-height: 90vh;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">🦅</div>
            <span class="logo-text">VuckoClaw 🦅</span>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" data-section="dashboard">
                <span class="nav-icon">◈</span>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" data-section="activities">
                <span class="nav-icon">▤</span>
                <span>Aktivitäten</span>
            </div>
            <div class="nav-item" data-section="context">
                <span class="nav-icon">◉</span>
                <span>Context-Speicher</span>
            </div>
        </nav>
        <!-- Status & Login -->
        <div style="padding: 16px; border-top: 1px solid #3A3F4B; margin-top: auto;">
            <div id="authSection" style="margin-bottom: 12px;">
                <input type="password" id="loginToken" placeholder="Token..." style="width: 100%; padding: 8px; background: #1C1F26; border: 1px solid #3A3F4B; border-radius: 6px; color: #E4E6EB; margin-bottom: 8px; font-size: 13px;">
                <button onclick="login()" style="width: 100%; padding: 8px; background: #2E333D; border: 1px solid #3A3F4B; border-radius: 6px; color: #E4E6EB; cursor: pointer; font-size: 13px;">Anmelden</button>
            </div>
            <div id="statusSection" style="display: none; align-items: center; gap: 8px; padding: 8px; background: #1C1F26; border-radius: 6px; font-size: 13px; color: #9CA3AF;">
                <div id="statusIndicator" style="width: 8px; height: 8px; border-radius: 50%; background: #6B7280;"></div>
                <select id="statusSelect" onchange="updateStatus()" style="background: transparent; border: none; color: inherit; font-size: inherit; cursor: pointer; outline: none; width: 100%;">
                    <option value="offline" style="background: #1C1F26;">Offline</option>
                    <option value="available" style="background: #1C1F26;">Verfügbar</option>
                    <option value="busy" style="background: #1C1F26;">Beschäftigt</option>
                </select>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <!-- Dashboard Section -->
        <section id="dashboard" class="dashboard-section active">
            <div class="header">
                <h1>Dashboard</h1>
                <p>Übersicht deines Kommandozentrums</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Gesamt Tasks</div>
                    <div class="stat-value" id="stat-total">0</div>
                </div>
                <div class="stat-card active">
                    <div class="stat-label">In Bearbeitung</div>
                    <div class="stat-value" id="stat-progress">0</div>
                </div>
                <div class="stat-card completed">
                    <div class="stat-label">Erledigt</div>
                    <div class="stat-value" id="stat-completed">0</div>
                </div>
            </div>

            <div class="quick-actions">
                <button class="btn btn-primary" onclick="openTaskModal()">
                    <span>+</span> Neue Task
                </button>
                <button class="btn btn-secondary" onclick="executeQueue()">
                    <span>▶</span> GO - Queue ausführen
                </button>
            </div>
        </section>

        <!-- Activities Section -->
        <section id="activities" class="dashboard-section">
            <div class="header">
                <h1>Aktivitäten</h1>
                <p>Task-Management & Queue-Steuerung</p>
            </div>

            <div class="quick-actions" style="margin-bottom: 24px;">
                <button class="btn btn-primary" onclick="openTaskModal()">
                    <span>+</span> Neue Task
                </button>
                <button class="btn btn-secondary" onclick="executeQueue()">
                    <span>▶</span> GO - Queue ausführen
                </button>
            </div>

            <div class="task-board active" id="taskBoard">
                <div class="task-column">
                    <div class="column-header">
                        <div class="column-title backlog">
                            <span>○</span> Backlog
                        </div>
                        <span class="task-count" id="count-backlog">0</span>
                    </div>
                    <div class="task-list" id="backlog-list"></div>
                </div>

                <div class="task-column">
                    <div class="column-header">
                        <div class="column-title progress">
                            <span>●</span> In Progress
                        </div>
                        <span class="task-count" id="count-progress">0</span>
                    </div>
                    <div class="task-list" id="progress-list"></div>
                </div>

                <div class="task-column">
                    <div class="column-header">
                        <div class="column-title completed">
                            <span>✓</span> Completed
                        </div>
                        <span class="task-count" id="count-completed">0</span>
                    </div>
                    <div class="task-list" id="completed-list"></div>
                </div>
            </div>
        </section>

        <!-- Context Section -->
        <section id="context" class="dashboard-section context-section">
            <div class="header">
                <h1>Context-Speicher</h1>
                <p>Verwaltung der Memory-Dateien</p>
            </div>

            <div class="context-grid" id="context-grid">
                <!-- Dynamically filled -->
            </div>
        </section>
    </main>

    <!-- Task Modal -->
    <div class="modal-overlay" id="taskModal">
        <div class="modal">
            <h2 class="modal-title" id="modalTitle">Neue Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label class="form-label">Titel</label>
                    <input type="text" class="form-input" id="taskTitle" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Beschreibung</label>
                    <textarea class="form-textarea" id="taskDesc"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeTaskModal()">Abbrechen</button>
                    <button type="submit" class="btn btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
