<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="CruiseConnect – Routen für Autofahrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GPS-Berechtigung explizit für diesen Origin erlauben -->
  <meta http-equiv="Permissions-Policy" content="geolocation=(self)">

  <!-- Preconnect zu Mapbox-Domains für schnellere Tile-Requests -->
  <link rel="preconnect" href="https://api.mapbox.com">
  <link rel="preconnect" href="https://events.mapbox.com">
  <link rel="preconnect" href="https://a.tiles.mapbox.com">
  <link rel="preconnect" href="https://b.tiles.mapbox.com">
  <link rel="preconnect" href="https://c.tiles.mapbox.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="cruise_connect">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>CruiseConnect</title>
  <link rel="manifest" href="manifest.json">

  <!-- flutter_map nutzt Mapbox Raster-Tiles direkt — kein mapbox-gl.js nötig -->
  <!-- CORS-Header werden von Mapbox automatisch gesetzt für Tile-Requests -->
</head>
<body>
  <!-- Lade-Indikator bis Flutter bereit ist -->
  <style>
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 48px; height: 48px;
      border: 4px solid #333;
      border-top-color: #e63946;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <div id="loading-overlay">
    <div class="loader-ring"></div>
  </div>
  <script>
    // Overlay ausblenden sobald Flutter das erste Frame gerendert hat
    window.addEventListener('flutter-first-frame', function () {
      var overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('hidden');
        setTimeout(function () { overlay.remove(); }, 450);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
