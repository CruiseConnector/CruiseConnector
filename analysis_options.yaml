# Dart/Flutter Analyzer-Konfiguration für CruiseConnect
# Dokumentation: https://dart.dev/guides/language/analysis-options

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    # Ungenutzte Imports als Warnung (nicht Error) – aufräumen wenn Zeit ist
    unused_import: warning
    # Ungenutzte lokale Variablen als Warnung
    unused_local_variable: warning

linter:
  rules:
    # Bevorzuge const-Konstruktoren wo möglich (reduziert Widget-Rebuilds)
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
    prefer_const_declarations: true

    # Code-Qualität
    prefer_single_quotes: true
    avoid_print: false       # debugPrint wird im Projekt bewusst genutzt
    use_super_parameters: true

    # Sicherheit
    avoid_dynamic_calls: false  # Wird in JSON-Parsing benötigt (route_service)
