name: Deploy to Vercel

on:
  push:
    branches: [ main ]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Generate Secrets File
        run: |
          mkdir -p lib/config
          cat > lib/config/secrets.dart << 'DART'
          class AppSecrets {
            AppSecrets._();
            static const String mapboxPublicToken = '${{ secrets.MAPBOX_PUBLIC_TOKEN }}';
            static const String supabaseUrl = '${{ secrets.SUPABASE_URL }}';
            static const String supabaseAnonKey = '${{ secrets.SUPABASE_ANON_KEY }}';
          }
          DART

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web --release

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          cd build/web
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
