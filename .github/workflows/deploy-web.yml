name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, feature/web-navigation-improvements ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Generate Secrets
        run: |
          mkdir -p lib/config
          printf '%s\n' \
            'class AppSecrets {' \
            '  AppSecrets._();' \
            '  static const String mapboxPublicToken = '"'"'${{ secrets.MAPBOX_PUBLIC_TOKEN }}'"'"';' \
            '  static const String supabaseUrl = '"'"'${{ secrets.SUPABASE_URL }}'"'"';' \
            '  static const String supabaseAnonKey = '"'"'${{ secrets.SUPABASE_ANON_KEY }}'"'"';' \
            '}' > lib/config/secrets.dart
          cat lib/config/secrets.dart

      - name: Build
        run: |
          flutter pub get
          flutter build web --release \
            --web-renderer canvaskit \
            --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
