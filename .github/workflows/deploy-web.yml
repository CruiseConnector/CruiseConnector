name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Flutter Setup
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Generate Secrets
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_PUBLIC_TOKEN }}
          SB_URL: ${{ secrets.SUPABASE_URL }}
          SB_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          mkdir -p lib/config
          echo "class AppSecrets {" > lib/config/secrets.dart
          echo "  AppSecrets._();" >> lib/config/secrets.dart
          echo "  static const String mapboxPublicToken = '${MAPBOX_TOKEN}';" >> lib/config/secrets.dart
          echo "  static const String supabaseUrl = '${SB_URL}';" >> lib/config/secrets.dart
          echo "  static const String supabaseAnonKey = '${SB_KEY}';" >> lib/config/secrets.dart
          echo "}" >> lib/config/secrets.dart

      - name: Build
        run: |
          flutter pub get
          flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
